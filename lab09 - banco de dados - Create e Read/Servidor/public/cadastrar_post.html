<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Post</title>
    <link href="/estilo.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Novo Post</h1>
        <div class="divider"></div>

        <form method="post" action="/cadastrar_post">
            <div class="campo">
                <label>Título</label>
                <input type="text" name="titulo" placeholder="Digite o título...">
            </div>
            <div class="campo">
                <label>Resumo</label>
                <input type="text" name="resumo" placeholder="Digite o resumo...">
            </div>
            <div class="campo">
                <label>Conteúdo</label>
                <textarea name="conteudo" rows="6" placeholder="Digite o conteúdo..."></textarea>
            </div>
            <input type="submit" value="Publicar">
        </form>
    </div>
</body>
</html>
